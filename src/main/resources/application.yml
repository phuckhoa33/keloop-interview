spring:
  application:
    name: interview-scheduler
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scheduler_db}
    username: ${SPRING_DATASOURCE_USERNAME:scheduler_user}
    password: ${SPRING_DATASOURCE_PASSWORD:scheduler_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:}
      timeout: 2000ms

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_PROBABILITY:1.0}
  metrics:
    export:
      prometheus:
        enabled: true

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    issuer: https://keyloop-interview.local
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 7
    private-key-path: ${JWT_PRIVATE_KEY_PATH:}
    public-key-path: ${JWT_PUBLIC_KEY_PATH:}
    key-id: scheduler-key-1
  internal:
    secret: ${INTERNAL_API_SECRET:dev-internal-secret-change-me}
logging:
  level:
    com.keyloop.interview: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
